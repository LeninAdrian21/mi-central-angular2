<mat-sidenav-container fullscreen>
  <mat-sidenav #sidenav mode="push">
    <mat-toolbar color="primary">
        <span class="ps-1 pe-3">Menu</span>
        <span class="spacer"></span>
        <button mat-icon-button (click)="sidenav.toggle()">
          <mat-icon >menu</mat-icon>
        </button>
    </mat-toolbar>
    <mat-nav-list class="p-0">
        <a  *ngFor="let data of nav" [routerLink]="[data.routerLink]" mat-list-item (click)="sidenav.toggle()">
          <div class="d-flex">
            <mat-icon >{{data.icon}}</mat-icon>
            <span class="ps-3">{{data.label}}</span>
          </div>
        </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-toolbar>
    <button mat-icon-button (click)="sidenav.toggle()">
      <mat-icon >menu</mat-icon>
    </button>
    <div class="w-100">
      <a [routerLink]="['/home']" class="text-white text-decoration-none"><h1 class="text-center">Mi central</h1></a>
    </div>
    <span class="spacer"></span>
    <button mat-button (click)="LogOut()" >
      Logout
    </button>
  </mat-toolbar>
  <router-outlet></router-outlet>
</mat-sidenav-container>
